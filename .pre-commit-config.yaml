# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-docstring-first
  - id: check-json
  - id: check-toml
  - id: check-xml
  - id: check-ast
  - id: check-symlinks
  - id: check-vcs-permalinks
  - id: debug-statements
  - id: detect-aws-credentials
    args: [--allow-missing-credentials]
  - id: detect-private-key
  - id: mixed-line-ending
  - id: pretty-format-json
    args: [--autofix]
  - id: requirements-txt-fixer
  # Additional regression guards (verified to pass on the current tree)
  - id: check-merge-conflict
  - id: check-builtin-literals
  - id: check-illegal-windows-names
  - id: check-shebang-scripts-are-executable
  - id: destroyed-symlinks
  - id: forbid-submodules
  - id: fix-byte-order-marker
  - id: double-quote-string-fixer

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
  - id: pyupgrade
    args: [--keep-percent-format]

- repo: https://github.com/bwhmather/ssort
  rev: 0.16.0
  hooks:
  - id: ssort

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.18
  hooks:
  - id: ruff
    args: [--preview, --fix]

- repo: https://github.com/facebook/pyrefly-pre-commit
  rev: 1.1.1
  hooks:
  - id: pyrefly-check
    # Behavior (e.g. ignore-missing-imports for uninstalled deps) is configured
    # under [tool.pyrefly] in pyproject.toml. The dedicated type-check CI
    # (.github/workflows/typecheck.yml) still runs mypy.

- repo: https://github.com/rhysd/actionlint
  rev: v1.7.12
  hooks:
  - id: actionlint
